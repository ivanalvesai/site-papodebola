<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Classificação, jogos, resultados e artilharia do campeonato.">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="manifest" href="../manifest.json">
    <meta name="robots" content="index, follow">
    <title>Campeonato - Papo de Bola</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css?v=12">
    <style>
        body { font-family: 'Open Sans', -apple-system, sans-serif; font-weight: 400; }
        .ch-hero { background: #fff; border-bottom: 1px solid #E2E5E9; padding: 24px 0; }
        .ch-hero-inner { display: flex; align-items: center; gap: 16px; }
        .ch-logo { width: 56px; height: 56px; background: #F2F3F5; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #00965E; border: 2px solid #E2E5E9; flex-shrink: 0; }
        .ch-hero h1 { font-family: 'Open Sans', sans-serif; font-size: 24px; font-weight: 700; text-transform: uppercase; color: #1A1D23; }
        .ch-hero .ch-sub { font-size: 13px; color: #8896A6; }

        /* Layout: standings left, matches right */
        .ch-grid { display: grid; grid-template-columns: 1fr 360px; gap: 24px; padding: 24px 0; }

        /* Standings */
        .ch-standings { background: #fff; border: 1px solid #E2E5E9; border-radius: 8px; overflow: hidden; }
        .ch-standings-title { font-family: 'Open Sans', sans-serif; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; padding: 12px 16px; background: #F2F3F5; border-bottom: 1px solid #E2E5E9; display: flex; align-items: center; gap: 6px; color: #1A1D23; }
        .ch-standings-title i { color: #00965E; }
        .st-table { width: 100%; border-collapse: collapse; }
        .st-table th { font-family: 'Open Sans', sans-serif; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: #8896A6; padding: 8px 8px; text-align: center; }
        .st-table th:nth-child(2) { text-align: left; }
        .st-table td { font-size: 12px; padding: 7px 8px; text-align: center; border-bottom: 1px solid #EEF0F2; }
        .st-table td:nth-child(2) { text-align: left; }
        .st-table tr:last-child td { border-bottom: none; }
        .st-table tr:hover { background: #F8F9FA; }
        .st-team { display: flex; align-items: center; gap: 6px; font-weight: 500; }
        .st-team img { width: 18px; height: 18px; object-fit: contain; }
        .st-pts { font-family: 'Open Sans', sans-serif; font-weight: 700; font-size: 14px; color: #00965E; }
        .st-pos { font-family: 'Open Sans', sans-serif; font-weight: 600; font-size: 11px; color: #8896A6; }
        .st-zone { width: 3px; height: 18px; border-radius: 2px; display: inline-block; margin-right: 4px; vertical-align: middle; }
        .zl { background: #00965E; } .zs { background: #1A73E8; } .zr { background: #E8312A; }
        .st-legend { display: flex; gap: 16px; padding: 10px 16px; border-top: 1px solid #E2E5E9; font-size: 11px; color: #8896A6; flex-wrap: wrap; }
        .st-legend span::before { content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }
        .st-legend .l-lib::before { background: #00965E; }
        .st-legend .l-sul::before { background: #1A73E8; }
        .st-legend .l-reb::before { background: #E8312A; }

        /* Matches sidebar */
        .ch-matches { background: #fff; border: 1px solid #E2E5E9; border-radius: 8px; overflow: hidden; height: fit-content; position: sticky; top: 100px; }
        .ch-round-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #F2F3F5; border-bottom: 1px solid #E2E5E9; }
        .ch-round-header span { font-family: 'Open Sans', sans-serif; font-size: 13px; font-weight: 600; text-transform: uppercase; color: #1A1D23; }
        .ch-round-nav { display: flex; gap: 6px; }
        .ch-round-nav button { width: 28px; height: 28px; border-radius: 50%; background: #fff; border: 1px solid #E2E5E9; color: #4A5568; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; transition: all 0.15s; }
        .ch-round-nav button:hover { border-color: #00965E; color: #00965E; }

        .ch-match { display: flex; align-items: center; padding: 10px 14px; border-bottom: 1px solid #EEF0F2; transition: background 0.15s; }
        .ch-match:last-child { border-bottom: none; }
        .ch-match:hover { background: #F8F9FA; }
        .ch-match.live { background: #FDECEB; border-left: 3px solid #E8312A; }
        .ch-match-date { width: 44px; flex-shrink: 0; font-size: 10px; color: #8896A6; line-height: 1.3; }
        .ch-match-teams { flex: 1; min-width: 0; }
        .ch-match-row { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; line-height: 1.6; }
        .ch-match-row img { width: 16px; height: 16px; object-fit: contain; flex-shrink: 0; }
        .ch-match-row .score { font-family: 'Open Sans', sans-serif; font-weight: 700; font-size: 14px; margin-left: auto; min-width: 14px; text-align: right; }
        .ch-match-row .score.win { color: #00965E; }
        .ch-match-status { font-family: 'Open Sans', sans-serif; font-size: 8px; font-weight: 600; text-transform: uppercase; color: #E8312A; margin-left: 6px; }
        .ch-match-pending { font-size: 11px; color: #8896A6; margin-left: auto; font-weight: 500; }

        /* Scorers */
        .ch-scorers { background: #fff; border: 1px solid #E2E5E9; border-radius: 8px; overflow: hidden; margin-top: 24px; }
        .ch-scorer-item { display: flex; align-items: center; gap: 10px; padding: 8px 16px; border-bottom: 1px solid #EEF0F2; }
        .ch-scorer-item:last-child { border-bottom: none; }
        .ch-scorer-item:hover { background: #F8F9FA; }
        .ch-scorer-rank { font-family: 'Open Sans', sans-serif; font-size: 13px; font-weight: 700; color: #8896A6; width: 20px; text-align: center; }
        .ch-scorer-rank.top { color: #F59E0B; }
        .ch-scorer-photo { width: 32px; height: 32px; border-radius: 50%; background: #F2F3F5; overflow: hidden; flex-shrink: 0; }
        .ch-scorer-photo img { width: 100%; height: 100%; object-fit: cover; }
        .ch-scorer-info { flex: 1; }
        .ch-scorer-name { font-size: 13px; font-weight: 600; }
        .ch-scorer-team { font-size: 10px; color: #8896A6; display: flex; align-items: center; gap: 4px; }
        .ch-scorer-team img { width: 12px; height: 12px; }
        .ch-scorer-goals { font-family: 'Open Sans', sans-serif; font-size: 16px; font-weight: 700; color: #00965E; }

        @media (max-width: 900px) {
            .ch-grid { grid-template-columns: 1fr; }
            .ch-matches { position: static; }
        }
        @media (max-width: 768px) {
            .ch-hero h1 { font-size: 20px; }
            .st-table td, .st-table th { padding: 6px 5px; font-size: 11px; }
            .ch-match-row { font-size: 12px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-top"><div class="container"><div class="header-top-content">
            <div class="logo"><a href="../index.html"><i class="fas fa-futbol logo-icon"></i><span class="logo-text">PAPO <span class="logo-accent">DE BOLA</span></span></a></div>
            <div class="header-actions"><a href="../index.html" style="color:#4A5568;font-size:14px"><i class="fas fa-arrow-left"></i> Início</a></div>
        </div></div></div>
        <nav class="main-nav"><div class="container"><ul class="nav-list">
            <li class="nav-item"><a href="../index.html" class="nav-link"><i class="fas fa-home"></i> Início</a></li>
            <li class="nav-item"><a href="noticias.html" class="nav-link"><i class="fas fa-newspaper"></i> Notícias</a></li>
            <li class="nav-item"><a href="ao-vivo.html" class="nav-link live-link"><span class="live-dot"></span> AO VIVO</a></li>
        </ul></div></nav>
    </header>

    <section class="ch-hero"><div class="container">
        <div class="ch-hero-inner">
            <div class="ch-logo"><i class="fas fa-trophy"></i></div>
            <div>
                <h1 id="champName">Carregando...</h1>
                <div class="ch-sub" id="champMeta"></div>
            </div>
        </div>
    </div></section>

    <main><div class="container">
        <div class="ch-grid">
            <!-- LEFT: Standings -->
            <div>
                <div class="ch-standings" id="standingsBox">
                    <div class="loading-state"><div class="spinner"></div></div>
                </div>
                <!-- Scorers below standings -->
                <div class="ch-scorers" id="scorersBox" style="display:none">
                    <div class="ch-standings-title"><i class="fas fa-futbol"></i> Artilharia</div>
                    <div id="scorersList"></div>
                </div>
            </div>

            <!-- RIGHT: Matches by round -->
            <div>
                <div class="ch-matches" id="matchesBox">
                    <div class="loading-state"><div class="spinner"></div></div>
                </div>
            </div>
        </div>
    </div></main>

    <footer class="footer"><div class="container"><div class="footer-bottom" style="border-top:none;padding-top:0"><p>&copy; 2026 Papo de Bola.</p></div></div></footer>

    <script>
    const CACHE_BASE = window.location.origin + '/cache';
    const P = {
        tid: null, name: '', data: null, round: null,

        async init() {
            const params = new URLSearchParams(window.location.search);
            this.tid = parseInt(params.get('id'));
            this.name = decodeURIComponent(params.get('name') || '');
            document.getElementById('champName').textContent = this.name;
            document.title = `${this.name} - Papo de Bola`;

            try {
                const res = await fetch(`${CACHE_BASE}/champ_${this.tid}.json?_=${Date.now()}`);
                if (res.ok) this.data = await res.json();
            } catch {}

            if (this.data) {
                document.getElementById('champMeta').textContent = this.data.currentRound ? `Rodada ${this.data.currentRound} de ${this.data.rounds?.length || '?'}` : '';
                this.round = this.data.currentRound || 1;
                this.renderStandings();
                this.renderMatches();
                this.renderScorers();
            } else {
                document.getElementById('standingsBox').innerHTML = '<div style="padding:24px;text-align:center;color:#8896A6">Dados não disponíveis no cache. Aguarde a próxima atualização.</div>';
                document.getElementById('matchesBox').innerHTML = '<div style="padding:24px;text-align:center;color:#8896A6">Sem dados</div>';
            }
        },

        renderStandings() {
            const box = document.getElementById('standingsBox');
            if (!this.data?.standings?.length) { box.innerHTML = '<div style="padding:20px;text-align:center;color:#8896A6">Classificação indisponível</div>'; return; }
            const isBR = [325, 390].includes(this.tid);
            let html = '<div class="ch-standings-title"><i class="fas fa-list-ol"></i> Classificação</div>';

            this.data.standings.forEach((group, gi) => {
                if (this.data.standings.length > 1 && group.name) html += `<div style="padding:10px 16px;font-family:'Open Sans',sans-serif;font-size:12px;text-transform:uppercase;color:#00965E;background:#F2F3F5;border-bottom:1px solid #E2E5E9">${group.name}</div>`;

                html += '<table class="st-table"><thead><tr><th>#</th><th>Time</th><th>P</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th></tr></thead><tbody>';

                group.rows.forEach((r, i) => {
                    const pos = r.pos || (i + 1);
                    let z = '';
                    if (isBR) {
                        if (r.promo?.includes('Libertadores') || (!r.promo && pos <= 4)) z = 'zl';
                        else if (r.promo?.includes('Sul-Americana') || r.promo?.includes('Sudamericana') || (!r.promo && pos <= 6 && pos > 4)) z = 'zs';
                        else if (r.promo?.includes('Rebaixamento') || r.promo?.includes('Relegation') || (!r.promo && pos >= 17 && group.rows.length >= 20)) z = 'zr';
                    }
                    html += `<tr>
                        <td><span class="st-pos">${z ? `<span class="st-zone ${z}"></span>` : ''}${pos}</span></td>
                        <td><div class="st-team">${r.teamId ? `<img src="/img/team/${r.teamId}/image" alt="" onerror="this.style.display='none'">` : ''}${r.team}</div></td>
                        <td class="st-pts">${r.pts}</td><td>${r.matches}</td><td>${r.wins}</td><td>${r.draws}</td><td>${r.losses}</td>
                        <td>${r.gf||0}</td><td>${r.ga||0}</td><td style="font-weight:600">${r.gd}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
            });

            if (isBR) html += '<div class="st-legend"><span class="l-lib">Libertadores</span><span class="l-sul">Sul-Americana</span><span class="l-reb">Rebaixamento</span></div>';
            box.innerHTML = html;
        },

        renderMatches() {
            const box = document.getElementById('matchesBox');
            if (!this.data?.matchesByRound || Object.keys(this.data.matchesByRound).length === 0) {
                box.innerHTML = '<div style="padding:20px;text-align:center;color:#8896A6">Jogos indisponíveis</div>';
                return;
            }

            // Find the best round to show: last round with results, or first future round
            const allRounds = Object.keys(this.data.matchesByRound).map(Number).sort((a,b) => a - b);
            let bestRound = this.round;

            // Find last round that has finished matches
            let lastFinished = null;
            let firstFuture = null;
            for (const r of allRounds) {
                const matches = this.data.matchesByRound[r];
                if (!matches || matches.length === 0) continue;
                const hasFinished = matches.some(m => m.status === 'finished');
                const hasFuture = matches.some(m => m.status === 'notstarted');
                if (hasFinished) lastFinished = r;
                if (hasFuture && !firstFuture) firstFuture = r;
            }

            // Best round: first with future games, otherwise last with results
            if (firstFuture) {
                bestRound = firstFuture;
            } else if (lastFinished) {
                bestRound = lastFinished;
            } else {
                bestRound = allRounds[allRounds.length - 1] || this.round;
            }

            this.round = bestRound;
            this.showRound(bestRound);

            // Show next matches info if no future rounds cached
            if (!firstFuture && lastFinished) {
                const box = document.getElementById('matchesBox');
                box.innerHTML += '<div style="padding:14px 16px;text-align:center;color:#8896A6;font-size:12px;border-top:1px solid #EEF0F2;background:#F8F9FA"><i class="fas fa-calendar-alt" style="margin-right:4px"></i> Próximos jogos ainda não definidos</div>';
            }
        },

        showRound(r) {
            this.round = r;
            const box = document.getElementById('matchesBox');
            const matches = this.data.matchesByRound[r];
            const allRounds = Object.keys(this.data.matchesByRound).map(Number).sort((a,b) => a-b);
            const canPrev = allRounds.indexOf(r) > 0;
            const canNext = allRounds.indexOf(r) < allRounds.length - 1;

            // Count finished/future
            const finished = matches?.filter(m => m.status === 'finished').length || 0;
            const future = matches?.filter(m => m.status === 'notstarted').length || 0;
            const roundLabel = future > 0 && finished === 0 ? 'Próxima rodada' : `Rodada ${r}`;

            let html = `<div class="ch-round-header">
                <span>${roundLabel}</span>
                <div class="ch-round-nav">
                    <button ${canPrev ? `onclick="P.prevRound()"` : 'disabled style="opacity:0.3"'}><i class="fas fa-chevron-left"></i></button>
                    <button ${canNext ? `onclick="P.nextRound()"` : 'disabled style="opacity:0.3"'}><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>`;

            if (!matches || matches.length === 0) {
                html += '<div style="padding:20px;text-align:center;color:#8896A6;font-size:13px">Sem jogos nesta rodada</div>';
            } else {
                matches.forEach(m => {
                    const dt = m.timestamp ? new Date(m.timestamp * 1000) : null;
                    const day = dt ? dt.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' }) : '';
                    const time = dt ? dt.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' }) : '';
                    const fin = m.status === 'finished';
                    const live = m.status === 'inprogress';
                    const has = m.homeScore !== null;

                    const hWin = has && m.homeScore > m.awayScore;
                    const aWin = has && m.awayScore > m.homeScore;

                    html += `<div class="ch-match ${live ? 'live' : ''}">
                        <div class="ch-match-date">${day}<br>${time}${live ? '<br><span class="ch-match-status"><span class="live-dot" style="width:5px;height:5px"></span> AO VIVO</span>' : ''}</div>
                        <div class="ch-match-teams">
                            <div class="ch-match-row">
                                ${m.homeId ? `<img src="/img/team/${m.homeId}/image" alt="" onerror="this.style.display='none'">` : ''}
                                <span>${m.home}</span>
                                ${has ? `<span class="score ${hWin?'win':''}">${m.homeScore}</span>` : ''}
                            </div>
                            <div class="ch-match-row">
                                ${m.awayId ? `<img src="/img/team/${m.awayId}/image" alt="" onerror="this.style.display='none'">` : ''}
                                <span>${m.away}</span>
                                ${has ? `<span class="score ${aWin?'win':''}">${m.awayScore}</span>` : ''}
                                ${!has ? `<span class="ch-match-pending">${time}</span>` : ''}
                            </div>
                        </div>
                    </div>`;
                });
            }

            box.innerHTML = html;
        },

        prevRound() {
            const allRounds = Object.keys(this.data.matchesByRound).map(Number).sort((a,b) => a-b);
            const idx = allRounds.indexOf(this.round);
            if (idx > 0) this.showRound(allRounds[idx - 1]);
        },

        nextRound() {
            const allRounds = Object.keys(this.data.matchesByRound).map(Number).sort((a,b) => a-b);
            const idx = allRounds.indexOf(this.round);
            if (idx < allRounds.length - 1) this.showRound(allRounds[idx + 1]);
        },

        renderScorers() {
            if (!this.data?.topScorers?.length) return;
            document.getElementById('scorersBox').style.display = 'block';
            document.getElementById('scorersList').innerHTML = this.data.topScorers.map((s, i) => `
                <div class="ch-scorer-item">
                    <span class="ch-scorer-rank ${i < 3 ? 'top' : ''}">${i + 1}</span>
                    <div class="ch-scorer-photo">${s.playerId ? `<img src="/img/player/${s.playerId}/image" alt="" onerror="this.outerHTML='<i class=\\'fas fa-user\\' style=\\'color:#8896A6;font-size:14px;display:flex;align-items:center;justify-content:center;width:100%;height:100%\\'></i>'">` : ''}</div>
                    <div class="ch-scorer-info">
                        <div class="ch-scorer-name">${s.name}</div>
                        <div class="ch-scorer-team">${s.teamId ? `<img src="/img/team/${s.teamId}/image" alt="">` : ''}${s.team}</div>
                    </div>
                    <span class="ch-scorer-goals">${s.goals}</span>
                </div>
            `).join('');
        },
    };

    document.addEventListener('DOMContentLoaded', () => P.init());
    </script>
<script src="../js/nav.js?v=22"></script>
</body>
</html>
