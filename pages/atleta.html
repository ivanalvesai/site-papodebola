<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Perfil, estatísticas, resultados e próximos jogos do atleta.">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <meta name="robots" content="index, follow">
    <title>Atleta - Papo de Bola</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css?v=21">
    <style>
        .at-hero { background: linear-gradient(135deg, #1B2631 0%, #2C3E50 100%); color: white; padding: 40px 0; }
        .at-hero-inner { display: flex; align-items: center; gap: 24px; }
        .at-photo { width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 3px solid rgba(255,255,255,0.3); overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .at-photo img { width: 100%; height: 100%; object-fit: cover; }
        .at-photo .at-placeholder { font-size: 48px; color: rgba(255,255,255,0.3); }
        .at-info h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
        .at-info .at-sport { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 12px; }
        .at-info .at-flag { font-size: 18px; margin-right: 6px; }
        .at-stats-row { display: flex; gap: 24px; margin-top: 12px; }
        .at-stat { text-align: center; }
        .at-stat-value { font-size: 24px; font-weight: 700; color: #00965E; line-height: 1; }
        .at-stat-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }

        .at-grid { display: grid; grid-template-columns: 1fr 340px; gap: 24px; padding: 24px 0 60px; }
        .at-card { background: #fff; border: 1px solid #E2E5E9; border-radius: 8px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
        .at-card-title { padding: 12px 16px; font-size: 14px; font-weight: 700; border-bottom: 1px solid #E2E5E9; background: #F2F3F5; }
        .at-match { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #EEF0F2; gap: 12px; }
        .at-match:last-child { border-bottom: none; }
        .at-match:hover { background: #F8F9FA; }
        .at-match-date { font-size: 11px; color: #8896A6; width: 60px; flex-shrink: 0; }
        .at-match-teams { flex: 1; font-size: 14px; font-weight: 500; }
        .at-match-score { font-size: 15px; font-weight: 700; color: #1A1D23; min-width: 50px; text-align: center; }
        .at-match-score .at-win { color: #00965E; }
        .at-match-score .at-loss { color: #E8312A; }
        .at-match-tournament { font-size: 10px; color: #8896A6; margin-top: 2px; }
        .at-match-result { font-size: 10px; font-weight: 700; text-transform: uppercase; width: 20px; text-align: center; }
        .at-match-result.w { color: #00965E; }
        .at-match-result.l { color: #E8312A; }

        .at-next-match { padding: 20px; text-align: center; }
        .at-next-teams { display: flex; align-items: center; justify-content: center; gap: 16px; margin: 12px 0; font-size: 16px; font-weight: 600; }
        .at-next-vs { font-size: 20px; font-weight: 700; color: #8896A6; }
        .at-next-date { font-size: 13px; color: #8896A6; }
        .at-next-tournament { font-size: 11px; color: #00965E; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }

        .at-news-item { display: flex; gap: 10px; padding: 10px 16px; border-bottom: 1px solid #EEF0F2; }
        .at-news-item:last-child { border-bottom: none; }
        .at-news-item:hover { background: #F8F9FA; }
        .at-news-item img { width: 80px; height: 56px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
        .at-news-title { font-size: 13px; font-weight: 600; line-height: 1.3; color: #1A1D23; }
        .at-news-date { font-size: 10px; color: #8896A6; margin-top: 4px; }

        @media (max-width: 768px) {
            .at-hero-inner { flex-direction: column; text-align: center; }
            .at-stats-row { justify-content: center; }
            .at-grid { grid-template-columns: 1fr; }
            .at-info h1 { font-size: 24px; }
            .at-photo { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-top"><div class="container"><div class="header-top-content">
            <div class="logo"><a href="../index.html"><i class="fas fa-futbol logo-icon"></i><span class="logo-text">PAPO <span class="logo-accent">DE BOLA</span></span></a></div>
            <div class="header-actions"><a href="../index.html" style="color:#4A5568;font-size:14px"><i class="fas fa-arrow-left"></i> Início</a></div>
        </div></div></div>
        <nav class="main-nav"><div class="container"><ul class="nav-list">
            <li class="nav-item"><a href="../index.html" class="nav-link">Início</a></li>
            <li class="nav-item"><a href="noticias.html" class="nav-link">Notícias</a></li>
            <li class="nav-item"><a href="ao-vivo.html" class="nav-link live-link"><span class="live-dot"></span> AO VIVO</a></li>
        </ul></div></nav>
    </header>

    <section class="at-hero"><div class="container">
        <div class="at-hero-inner">
            <div class="at-photo" id="athletePhoto"><div class="at-placeholder"><i class="fas fa-user"></i></div></div>
            <div class="at-info">
                <h1 id="athleteName">Carregando...</h1>
                <div class="at-sport" id="athleteSport"></div>
                <div class="at-stats-row" id="athleteStats"></div>
            </div>
        </div>
    </div></section>

    <main><div class="container">
        <div class="at-grid">
            <div>
                <!-- Next match -->
                <div class="at-card" id="nextMatchCard" style="display:none">
                    <div class="at-card-title">Próximo Jogo</div>
                    <div class="at-next-match" id="nextMatch"></div>
                </div>

                <!-- Previous matches -->
                <div class="at-card">
                    <div class="at-card-title">Resultados Recentes</div>
                    <div id="previousMatches"><div class="loading-state"><div class="spinner"></div></div></div>
                </div>
            </div>

            <aside>
                <!-- News -->
                <div class="at-card">
                    <div class="at-card-title">Notícias</div>
                    <div id="athleteNews"><div class="loading-state"><div class="spinner"></div></div></div>
                </div>
            </aside>
        </div>
    </div></main>

    <footer class="footer"><div class="container"><div class="footer-bottom" style="border-top:none;padding-top:0"><p>&copy; 2026 Papo de Bola.</p></div></div></footer>

    <script>
    const API_KEY = 'cf85a77dbbmsh438760ef71d5715p13923fjsnc2f2878572d2';
    const API_HOST = 'allsportsapi2.p.rapidapi.com';
    const CACHE_BASE = window.location.origin + '/cache';

    const COUNTRY_FLAGS = {
        'BR':'🇧🇷','US':'🇺🇸','ES':'🇪🇸','RS':'🇷🇸','IT':'🇮🇹','DE':'🇩🇪','GB':'🇬🇧','FR':'🇫🇷','AR':'🇦🇷',
        'AU':'🇦🇺','JP':'🇯🇵','CH':'🇨🇭','CA':'🇨🇦','RU':'🇷🇺','NO':'🇳🇴','DK':'🇩🇰','GR':'🇬🇷','PL':'🇵🇱',
        'PT':'🇵🇹','NL':'🇳🇱','BE':'🇧🇪','SE':'🇸🇪','CL':'🇨🇱','CO':'🇨🇴','MX':'🇲🇽','IE':'🇮🇪',
    };

    async function apiFetch(endpoint) {
        try {
            const res = await fetch(`https://${API_HOST}/api/${endpoint}`, {
                headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': API_HOST }
            });
            if (res.ok && res.status !== 204) return await res.json();
        } catch {}
        return null;
    }

    const Page = {
        sport: null, id: null, name: null,

        async init() {
            const params = new URLSearchParams(window.location.search);
            this.sport = params.get('s') || 'tennis';
            this.id = parseInt(params.get('id'));
            this.name = decodeURIComponent(params.get('name') || '');

            if (!this.id) { document.getElementById('athleteName').textContent = 'Atleta não encontrado'; return; }

            // Load player details
            const data = await apiFetch(`${this.sport}/team/${this.id}`);
            const player = data?.team;

            if (player) {
                document.getElementById('athleteName').textContent = player.name || this.name;
                document.title = `${player.name || this.name} - Papo de Bola`;

                const flag = COUNTRY_FLAGS[player.country?.alpha2] || '';
                const sportNames = { tennis: 'Tênis', basketball: 'Basquete', motorsport: 'Automobilismo', mma: 'MMA', volleyball: 'Vôlei', 'american-football': 'Futebol Americano' };
                const sportName = sportNames[this.sport] || player.sport?.name || '';
                const country = player.country?.name || '';

                document.getElementById('athleteSport').innerHTML = `${flag} ${country} | ${sportName}`;

                // Photo
                const photoEl = document.getElementById('athletePhoto');
                const img = new Image();
                img.src = `/img/team/${this.id}/image`;
                img.onload = () => { if (img.naturalWidth > 1) photoEl.innerHTML = `<img src="${img.src}" alt="${player.name}">`; };

                // Rankings (tennis)
                if (this.sport === 'tennis') {
                    const rankings = await apiFetch('tennis/rankings/atp');
                    const rank = rankings?.rankings?.find(r => r.team?.id === this.id);
                    if (rank) {
                        document.getElementById('athleteStats').innerHTML = `
                            <div class="at-stat"><div class="at-stat-value">${rank.ranking}º</div><div class="at-stat-label">Ranking</div></div>
                            <div class="at-stat"><div class="at-stat-value">${rank.points?.toLocaleString('pt-BR')}</div><div class="at-stat-label">Pontos</div></div>
                            <div class="at-stat"><div class="at-stat-value">${rank.bestRanking || '-'}</div><div class="at-stat-label">Melhor Ranking</div></div>
                        `;
                    }
                }
            } else {
                document.getElementById('athleteName').textContent = this.name || 'Atleta';
            }

            this.loadMatches();
            this.loadNews();
        },

        async loadMatches() {
            // Previous matches
            const prevData = await apiFetch(`${this.sport}/team/${this.id}/events/previous/0`);
            const prevEvents = prevData?.events || [];
            const container = document.getElementById('previousMatches');

            if (prevEvents.length === 0) {
                container.innerHTML = '<div style="padding:20px;text-align:center;color:#8896A6">Nenhum resultado recente</div>';
            } else {
                // API returns oldest first - reverse to show most recent on top
                const sorted = [...prevEvents].reverse();
                container.innerHTML = sorted.slice(0, 15).map(e => {
                    const dt = e.startTimestamp ? new Date(e.startTimestamp * 1000) : null;
                    const dateStr = dt ? dt.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }) : '';
                    const isHome = e.homeTeam?.id === this.id;
                    const myScore = isHome ? e.homeScore?.current : e.awayScore?.current;
                    const oppScore = isHome ? e.awayScore?.current : e.homeScore?.current;
                    const opponent = isHome ? e.awayTeam?.name : e.homeTeam?.name;
                    const opponentId = isHome ? e.awayTeam?.id : e.homeTeam?.id;
                    const won = myScore > oppScore;
                    const resultLetter = myScore > oppScore ? 'V' : myScore < oppScore ? 'D' : 'E';
                    const resultClass = myScore > oppScore ? 'w' : myScore < oppScore ? 'l' : '';
                    const tournament = e.tournament?.uniqueTournament?.name || e.tournament?.name || '';

                    return `<div class="at-match">
                        <div class="at-match-result ${resultClass}">${resultLetter}</div>
                        <div class="at-match-date">${dateStr}</div>
                        <div class="at-match-teams">
                            <div>vs ${opponent}</div>
                            <div class="at-match-tournament">${tournament}</div>
                        </div>
                        <div class="at-match-score">
                            <span class="${won ? 'at-win' : 'at-loss'}">${myScore}</span> - <span class="${!won ? 'at-win' : 'at-loss'}">${oppScore}</span>
                        </div>
                    </div>`;
                }).join('');
            }

            // Next match
            const nextData = await apiFetch(`${this.sport}/team/${this.id}/events/next/0`);
            const nextEvents = nextData?.events || [];

            if (nextEvents.length > 0) {
                const e = nextEvents[0];
                const dt = e.startTimestamp ? new Date(e.startTimestamp * 1000) : null;
                const dateStr = dt ? dt.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long' }) : '';
                const timeStr = dt ? dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) : '';
                const tournament = e.tournament?.uniqueTournament?.name || e.tournament?.name || '';

                document.getElementById('nextMatchCard').style.display = 'block';
                document.getElementById('nextMatch').innerHTML = `
                    <div class="at-next-tournament">${tournament}</div>
                    <div class="at-next-teams">
                        <span>${e.homeTeam?.name || '?'}</span>
                        <span class="at-next-vs">×</span>
                        <span>${e.awayTeam?.name || '?'}</span>
                    </div>
                    <div class="at-next-date">${dateStr} às ${timeStr}</div>
                `;
            }
        },

        async loadNews() {
            const container = document.getElementById('athleteNews');
            const playerName = document.getElementById('athleteName').textContent.toLowerCase();

            try {
                const res = await fetch(`${CACHE_BASE}/articles.json?_=${Date.now()}`);
                if (!res.ok) throw new Error();
                const articles = await res.json();

                const filtered = articles.filter(a => {
                    const text = ((a.rewrittenTitle || '') + ' ' + (a.rewrittenText || '')).toLowerCase();
                    const nameParts = playerName.split(' ');
                    return nameParts.some(part => part.length > 3 && text.includes(part));
                }).slice(0, 5);

                if (filtered.length === 0) {
                    container.innerHTML = '<div style="padding:20px;text-align:center;color:#8896A6">Nenhuma notícia encontrada</div>';
                    return;
                }

                container.innerHTML = filtered.map(a => {
                    const date = a.pubDate ? new Date(a.pubDate).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }) : '';
                    return `<a href="../artigos/${a.slug}.html" class="at-news-item">
                        ${a.image ? `<img src="${a.image}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
                        <div>
                            <div class="at-news-title">${a.rewrittenTitle || ''}</div>
                            <div class="at-news-date">${date}</div>
                        </div>
                    </a>`;
                }).join('');
            } catch {
                container.innerHTML = '<div style="padding:20px;text-align:center;color:#8896A6">Erro ao carregar</div>';
            }
        },
    };

    document.addEventListener('DOMContentLoaded', () => Page.init());
    </script>
<script src="../js/nav.js?v=22"></script>
</body>
</html>
